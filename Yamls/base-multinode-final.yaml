---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1        
      maxSurge: 1              
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      affinity:
        # Evita el nodo de control-plane
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: echo-server
          image: front:latest    
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:                
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      terminationGracePeriodSeconds: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: back
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1              
  selector:
    matchLabels:
      app: back
  template:
    metadata:
      labels:
        app: back
    spec:
      affinity:
        # Evita el nodo de control-plane
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: echo-server
          image: back:latest    
          ports:
            - name: http
              containerPort: 3000
      terminationGracePeriodSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: front-service
spec:
  selector:
    app: front
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 1500
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: back-service
spec:
  selector:
    app: back
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 1500
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
      - mydomain.com
    secretName: my-tls-secret
  ingressClassName: nginx
  rules:
    - host: mydomain.com
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: front-service
                port:
                  number: 1500
          - pathType: Prefix
            path: /api
            backend:
              service:
                name: front-service
                port:
                  number: 1500
          